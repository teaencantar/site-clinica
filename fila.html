<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Fila de atendimento — TEA Encantar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--rox:#703870}
*{box-sizing:border-box}
body{font-family:system-ui,Arial,sans-serif;background:#f6f1fb;color:#2a1330;margin:0;padding:16px}
h1{color:var(--rox);font-size:20px;margin:0 0 4px}
.sub{color:#7a6a86;font-size:13px;margin-bottom:14px}
#hdr{position:sticky;top:0;z-index:20;background:#f6f1fb;padding:14px 16px 8px;margin:-16px -16px 10px;box-shadow:0 6px 10px -8px rgba(112,56,112,.35)}
.bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:4px}
#busca{flex:1;min-width:180px;padding:10px 12px;border:1px solid #d9c8ec;border-radius:10px;font-size:15px}
.chip{border:1px solid #d9c8ec;background:#fff;border-radius:999px;padding:6px 12px;font-size:13px;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--rox);color:#fff;border-color:var(--rox)}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(112,56,112,.08)}
th,td{text-align:left;padding:10px 12px;font-size:14px;border-bottom:1px solid #f0eaf6;vertical-align:middle}
th{background:#faf7fd;color:#5a4866;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
tr.atencao td{background:#fff8f3}
tr.feito td:not(:first-child){opacity:.45}
.ckcol{text-align:center;width:54px}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:600}
.acao{display:inline-block;text-decoration:none;padding:5px 9px;border-radius:8px;font-size:13px;margin-right:6px;white-space:nowrap;border:none;font-family:inherit;cursor:pointer}
.wa{background:#dcfce7;color:#166534}
.docs{background:#ede9fe;color:#5b21b6}
.off{color:#bbb;font-size:13px}
.vazio{padding:30px;text-align:center;color:#999}
.foot{margin-top:10px;color:#9a8aa6;font-size:12px}
/* login */
#login{position:fixed;inset:0;background:#f0e8f8;display:flex;align-items:center;justify-content:center}
.card{background:#fff;max-width:360px;width:90%;border-radius:14px;padding:28px;box-shadow:0 6px 24px rgba(112,56,112,.15)}
.card h2{color:var(--rox);font-size:18px;margin:0 0 16px}
.card input{width:100%;box-sizing:border-box;padding:12px;border:1px solid #d9c8ec;border-radius:10px;font-size:16px;margin-bottom:12px}
.card button{width:100%;background:var(--rox);color:#fff;border:none;border-radius:10px;padding:13px;font-size:16px;font-weight:700;cursor:pointer}
.card .erro{color:#b91c1c;font-size:13px;margin-bottom:10px}
#app{display:none}
/* modal documentos */
#modal{display:none;position:fixed;inset:0;background:rgba(40,20,48,.55);align-items:center;justify-content:center;padding:16px;z-index:50}
.modalbox{background:#fff;max-width:780px;width:100%;max-height:86vh;overflow:auto;border-radius:14px;padding:18px}
.modalhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modalhead b{color:var(--rox);font-size:16px}
.modalhead button{background:none;border:none;font-size:26px;line-height:1;color:#888;cursor:pointer}
.docgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.doccard{display:block;text-decoration:none;color:#2a1330;border:1px solid #eadff5;border-radius:10px;overflow:hidden;background:#faf7fd}
.doccard img{width:100%;height:130px;object-fit:cover;display:block;background:#eee}
.docicon{height:130px;display:flex;align-items:center;justify-content:center;font-size:42px;background:#f1eafb}
.doccap{padding:7px 9px;font-size:12px;color:#5a4866}
@media(max-width:640px){td .pl,th.pl{display:none}}
</style>
</head>
<body>

<div id="login">
  <form class="card" onsubmit="entrar(event)">
    <h2>&#128274; Fila de atendimento</h2>
    <div class="erro" id="erroLogin" style="display:none">Senha incorreta.</div>
    <input type="password" id="senha" placeholder="Senha de acesso" autofocus required>
    <button type="submit">Entrar</button>
  </form>
</div>

<div id="app">
  <div id="hdr">
    <h1>Fila de atendimento &mdash; TEA Encantar</h1>
    <div class="sub" id="resumo"></div>
    <div class="bar">
      <input id="busca" placeholder="Buscar por n&uacute;mero, nome ou plano..." oninput="render()">
      <span id="chips"></span>
    </div>
  </div>
  <table>
    <thead><tr><th class="ckcol">Feito</th><th>N&uacute;mero</th><th>Perfil</th><th class="pl">Plano</th><th>Estado</th><th>Docs</th><th class="pl">&Uacute;ltima</th><th>A&ccedil;&otilde;es</th></tr></thead>
    <tbody id="tb"></tbody>
  </table>
  <div class="foot" id="foot"></div>
</div>

<div id="modal" onclick="fecharModal(event)">
  <div class="modalbox">
    <div class="modalhead"><b id="modaltit"></b><div><button type="button" id="btnzip" class="acao docs" style="margin-right:12px" onclick="baixarZip()">&#11015;&#65039; Baixar todos (ZIP)</button><button type="button" onclick="fecharModal(event,true)" style="vertical-align:middle">&times;</button></div></div>
    <div id="modalbody"></div>
  </div>
</div>

<script>
const FN = "https://nnbspcykhvcxpdywpbtb.supabase.co/functions/v1/fila";
let DADOS = [];
let filtro = "todos";
let senha = localStorage.getItem("fila_senha") || "";
let docsAtuais = [];
let docsLabel = "";
const CORES = {novo:["#e5e7eb","#374151"],triagem:["#dbeafe","#1e40af"],coletando:["#fef3c7","#92400e"],aguardando_validacao:["#ffedd5","#9a3412"],humano:["#fee2e2","#991b1b"],existente_silenciado:["#f3f4f6","#6b7280"],finalizado:["#dcfce7","#166534"]};
const ATENCAO = ["humano","aguardando_validacao"];

function esc(s){return (s==null?"":String(s));}
function digits(s){return (s||"").replace(/\D/g,"");}
function fmtData(iso){if(!iso)return "—";try{return new Date(iso).toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo",day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}catch(e){return "—";}}
function badge(estado){const c=CORES[estado]||["#eee","#555"];const s=document.createElement("span");s.className="badge";s.style.background=c[0];s.style.color=c[1];s.textContent=estado;return s;}

function chips(){const cont=document.getElementById("chips");cont.innerHTML="";const counts={};DADOS.forEach(r=>counts[r.estado]=(counts[r.estado]||0)+1);const lista=["todos"].concat(Object.keys(counts).sort((a,b)=>counts[b]-counts[a]));lista.forEach(est=>{const b=document.createElement("span");b.className="chip"+(filtro===est?" on":"");b.textContent=est==="todos"?("Todos ("+DADOS.length+")"):(est+" ("+counts[est]+")");b.onclick=()=>{filtro=est;render();};cont.appendChild(b);});}

function render(){
  chips();
  const q=document.getElementById("busca").value.toLowerCase().trim();
  const tb=document.getElementById("tb");tb.innerHTML="";let vis=0;
  DADOS.forEach(r=>{
    if(filtro!=="todos"&&r.estado!==filtro)return;
    if(q){const hay=(esc(r.telefone)+" "+esc(r.nome)+" "+esc(r.beneficiario)+" "+esc(r.plano)).toLowerCase();if(hay.indexOf(q)<0)return;}
    vis++;
    const tr=document.createElement("tr");if(ATENCAO.indexOf(r.estado)>=0)tr.className="atencao";if(r.respondido)tr.classList.add("feito");
    const td0=document.createElement("td");td0.className="ckcol";const cb=document.createElement("input");cb.type="checkbox";cb.checked=!!r.respondido;cb.title="Marcar como respondido";cb.style.width="20px";cb.style.height="20px";cb.style.cursor="pointer";cb.onchange=()=>marcarRespondido(r,cb.checked);td0.appendChild(cb);tr.appendChild(td0);
    const td1=document.createElement("td");td1.textContent=esc(r.telefone);tr.appendChild(td1);
    const td2=document.createElement("td");const nome=document.createElement("div");nome.textContent=r.nome||"—";td2.appendChild(nome);if(r.beneficiario){const b=document.createElement("div");b.style.fontSize="12px";b.style.color="#7a6a86";b.textContent="paciente: "+r.beneficiario;td2.appendChild(b);}tr.appendChild(td2);
    const td3=document.createElement("td");td3.className="pl";td3.textContent=r.plano||"—";tr.appendChild(td3);
    const td4=document.createElement("td");td4.appendChild(badge(r.estado));tr.appendChild(td4);
    const td5=document.createElement("td");td5.textContent=r.arquivos||0;tr.appendChild(td5);
    const td6=document.createElement("td");td6.className="pl";td6.textContent=fmtData(r.ultima);tr.appendChild(td6);
    const td7=document.createElement("td");const num=digits(r.telefone);
    const a=document.createElement("a");a.className="acao wa";a.href="https://wa.me/"+num;a.target="_blank";a.rel="noopener";a.textContent="💬 Conversa";td7.appendChild(a);
    if((r.arquivos||0)>0){const d=document.createElement("button");d.type="button";d.className="acao docs";d.textContent="📎 Documentos ("+r.arquivos+")";d.onclick=()=>abrirDocs(r.telefone,r.beneficiario||r.nome);td7.appendChild(d);}else{const s=document.createElement("span");s.className="off";s.textContent="sem docs";td7.appendChild(s);}
    tr.appendChild(td7);
    tb.appendChild(tr);
  });
  if(vis===0){const tr=document.createElement("tr");const td=document.createElement("td");td.colSpan=8;td.className="vazio";td.textContent="Nenhuma conversa neste filtro.";tr.appendChild(td);tb.appendChild(tr);}
  const at=DADOS.filter(r=>ATENCAO.indexOf(r.estado)>=0).length;
  document.getElementById("resumo").textContent=DADOS.length+" conversas · "+at+" precisando de atenção (humano / aguardando validação)";
  document.getElementById("foot").textContent="Mostrando "+vis+" · atualizado "+new Date().toLocaleTimeString("pt-BR",{timeZone:"America/Sao_Paulo"})+" · atualiza sozinho a cada 30s";
}

async function abrirDocs(tel,nome){
  const m=document.getElementById("modal");m.style.display="flex";
  document.getElementById("modaltit").textContent="Documentos · "+(nome||tel);
  const body=document.getElementById("modalbody");body.textContent="Carregando...";
  try{
    const r=await fetch(FN+"?docs="+encodeURIComponent(tel),{headers:{"x-fila-senha":senha},cache:"no-store"});
    if(!r.ok){body.textContent="Erro ao carregar os documentos.";return;}
    const docs=await r.json();
    docsAtuais=Array.isArray(docs)?docs:[];docsLabel=(nome||tel);
    if(!Array.isArray(docs)||!docs.length){body.textContent="Nenhum documento encontrado para este número.";return;}
    body.innerHTML="";
    const grid=document.createElement("div");grid.className="docgrid";
    docs.forEach((d,i)=>{
      const card=document.createElement("a");card.className="doccard";card.href=d.url||"#";card.target="_blank";card.rel="noopener";
      const mime=(d.mime||"").toLowerCase();
      if(mime.indexOf("image")>=0&&d.url){const img=document.createElement("img");img.src=d.url;img.loading="lazy";img.alt="documento "+(i+1);card.appendChild(img);}
      else{const ic=document.createElement("div");ic.className="docicon";ic.textContent="📄";card.appendChild(ic);}
      const cap=document.createElement("div");cap.className="doccap";cap.textContent=(mime.indexOf("pdf")>=0?"PDF":(mime.indexOf("image")>=0?"Foto":"Arquivo"))+" "+(i+1)+" · "+fmtData(d.criado);card.appendChild(cap);
      grid.appendChild(card);
    });
    body.appendChild(grid);
  }catch(e){body.textContent="Erro de conexão.";}
}
async function baixarZip(){
  if(!docsAtuais.length){return;}
  if(typeof JSZip==="undefined"){alert("Biblioteca de ZIP não carregou. Tente recarregar a página.");return;}
  const btn=document.getElementById("btnzip");const txt=btn.innerHTML;btn.disabled=true;
  try{
    const zip=new JSZip();let n=0;
    for(let i=0;i<docsAtuais.length;i++){
      const d=docsAtuais[i];if(!d.url)continue;
      btn.innerHTML="Baixando "+(i+1)+"/"+docsAtuais.length+"...";
      const resp=await fetch(d.url);if(!resp.ok)continue;
      const blob=await resp.blob();
      const ext=(d.nome&&d.nome.indexOf(".")>=0)?d.nome.split(".").pop():"bin";
      const mime=(d.mime||"").toLowerCase();
      const nm=String(i+1).padStart(2,"0")+"-"+(mime.indexOf("pdf")>=0?"documento":"foto")+"."+ext;
      zip.file(nm,blob);n++;
    }
    if(!n){alert("Nenhum arquivo pôde ser baixado.");return;}
    btn.innerHTML="Gerando ZIP...";
    const out=await zip.generateAsync({type:"blob"});
    const a=document.createElement("a");a.href=URL.createObjectURL(out);
    a.download="documentos-"+(docsLabel||"paciente").replace(/[^a-z0-9]+/gi,"_").slice(0,40)+".zip";
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  }catch(e){alert("Erro ao gerar o ZIP.");}
  finally{btn.disabled=false;btn.innerHTML=txt;}
}
function fecharModal(ev,force){if(force||ev.target.id==="modal"){document.getElementById("modal").style.display="none";}}
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.getElementById("modal").style.display="none";});

async function marcarRespondido(r,valor){
  const prev=r.respondido;r.respondido=valor;render();
  try{
    const resp=await fetch(FN+"?marcar="+encodeURIComponent(r.id)+"&valor="+(valor?1:0),{method:"POST",headers:{"x-fila-senha":senha}});
    if(!resp.ok)throw 0;
  }catch(e){r.respondido=prev;render();alert("Não consegui salvar. Verifique a conexão e tente de novo.");}
}

async function carregar(){
  if(!senha){mostrarLogin();return;}
  try{
    const r=await fetch(FN+"?format=json",{headers:{"x-fila-senha":senha},cache:"no-store"});
    if(r.status===401){senha="";localStorage.removeItem("fila_senha");mostrarLogin(true);return;}
    if(!r.ok)return;
    DADOS=await r.json();
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    render();
  }catch(e){/* offline: mantem ultima tela */}
}

function mostrarLogin(erro){
  document.getElementById("app").style.display="none";
  document.getElementById("login").style.display="flex";
  document.getElementById("erroLogin").style.display=erro?"block":"none";
}

function entrar(ev){
  ev.preventDefault();
  senha=document.getElementById("senha").value;
  localStorage.setItem("fila_senha",senha);
  carregar();
}

carregar();
setInterval(carregar,30000);
</script>
</body>
</html>
